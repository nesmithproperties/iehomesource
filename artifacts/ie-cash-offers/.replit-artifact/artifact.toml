kind = "web"
previewPath = "/"
title = "IE Cash Offers"
version = "1.0.0"
id = "artifacts/ie-cash-offers"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20705

[services.development]
run = "pnpm --filter @workspace/ie-cash-offers run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ie-cash-offers", "run", "build" ]
publicDir = "artifacts/ie-cash-offers/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20705"
BASE_PATH = "/"
